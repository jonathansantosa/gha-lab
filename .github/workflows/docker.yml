name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Write Dockerfile
        run: |
          cat > Dockerfile <<EOF
          FROM python:3.11-slim
          WORKDIR /app
          COPY app.py .
          CMD ["python", "app.py"]
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gha-lab:latest
            ghcr.io/${{ github.repository_owner }}/gha-lab:${{ github.sha }}